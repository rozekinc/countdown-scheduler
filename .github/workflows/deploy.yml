name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build display site
        run: |
          npm ci
          npm run build

      - name: Build admin app
        working-directory: admin-src
        run: |
          npm ci
          npm run build

      - name: Assemble Pages artifact
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/
          cp -R assets _site/assets
          cp -R data _site/data
          cp -R admin _site/admin
          shopt -s nullglob
          for f in *.png *.jpg *.jpeg *.gif *.svg *.mp3 *.wav; do
            cp "$f" _site/
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
