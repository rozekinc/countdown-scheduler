name: Deploy

on:
  # Data lives under data/ and is read live from the repo by the display
  # (raw.githubusercontent.com), so data edits need no rebuild/redeploy. Skip
  # CI for data-only pushes; code/media changes still deploy.
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Admin-app writes only ever touch data/ (see admin-src/githubApi.ts
      # assertDataPath()) and never change anything esbuild would rebuild --
      # so for a data-only push, skip straight to re-assembling the artifact
      # with the already-committed assets/ and admin/assets/ output.
      # Defaults to a full build whenever it can't tell for sure (first push,
      # force-push, missing history), since that's the safe fallback.
      - name: Check if this push only touches data/
        id: check
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
            echo "data_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$before" "${{ github.sha }}")"
          if [ -n "$changed" ] && [ -z "$(echo "$changed" | grep -v '^data/' || true)" ]; then
            echo "data_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "data_only=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.data_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build display site
        if: steps.check.outputs.data_only != 'true'
        run: |
          npm ci
          npm run build

      - name: Build admin app
        if: steps.check.outputs.data_only != 'true'
        working-directory: admin-src
        run: |
          npm ci
          npm run build

      - name: Assemble Pages artifact
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html _site/
          cp -R assets _site/assets
          cp -R data _site/data
          cp -R admin _site/admin
          cp -R media _site/media

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
