<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>カウントダウンスケジューラー</title>
  <style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Noto Sans JP', sans-serif;
  overflow: hidden;
}

.aspect-container {
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #000;
}

.aspect-inner {
  position: relative;
  width: 100vw;
  height: calc(100vw * 9 / 16);
  max-height: 100vh;
  max-width: calc(100vh * 16 / 9);
  background-color: #fff;
  overflow: hidden;
  padding: 0;
}

/* --- ロゴと4413.pngの配置調整 --- */
.logo-area {
  position: absolute;
  top: 1vh; 
  left: 1vw;
  width: clamp(200px, 40vw, 350px); 
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  /* 画像間の隙間をゼロにする */
  gap: 0; 
  z-index: 15;
  pointer-events: none;
}

#top-banner {
  width: 100%; 
  height: auto;
/* ここで4413.png自体の位置を少し下げます */
  margin-top: 20px; 
  /* 下のロゴとの間隔を詰めたい場合はここを0かマイナスに */
  margin-bottom: -75px;
}

#logo { 
  height: clamp(200px, 40vh, 350px); 
  width: auto;
  max-width: 90%; 
  object-fit: contain;
  /* 上方向のマージンを削除 */
  margin-top: 0; 
}
/* ---------------------------- */

.label {
  font-size: clamp(20px, 3.5vw, 45px);
  margin-right: 2px;
  white-space: nowrap;
  color: #484848;
}
.bracket {
  margin-left: 0;
}

.time-label {
  font-size: clamp(18px, 3vw, 40px);
  text-align: center;
  color: #484848;
}

/* 現在時刻 */
#time-container {
  position: absolute;
  top: 2.5vh; 
  left: 58%;
  transform: translateX(-50%);
  font-size: clamp(25px, 5.5vw, 80px);
  color: #484848;
  user-select: none;
  white-space: nowrap;
  z-index: 20;
  pointer-events: none;
  transition: left 0.5s ease-in-out;
}

/* タイトルとカウントダウン全体 */
#main {
  position: absolute;
  top: 28vh;         
  left: 40%;
  transform: translateX(-50%);
  width: 55%;
  text-align: center;
  user-select: none;  
  z-index: 10;
}

/* タイトル */
#title {
  font-size: clamp(25px, 5.5vw, 80px);
  margin: 0 0 1.33vh 0;
  word-break: break-word;
  white-space: pre-line;
}

/* カウントダウン */
#countdown {
  font-size: clamp(36px, 8vw, 120px);
  font-weight: bold;
  color: #e60000;
  font-feature-settings: "tnum";
  white-space: nowrap;
}

#countdown .ms {
  font-size: 0.5em;
  vertical-align: -0.1em;
}

#announcement {
  position: absolute;
  top: 62vh;
  left: 0;
  width: 100%; /* スケジュール欄(25%)の左側ギリギリまで */
  box-sizing: border-box;
  padding: 10px 0px; /* 線の手前でわずかにマージン */
  background: transparent;
  z-index: 100;
  text-align: center;
  font-size: clamp(24px, 2.4vw, 38px);
  color: black;
  font-weight: bold;
  white-space: nowrap;       /* 絶対に改行させない */
  overflow: hidden;          /* 万が一の突き抜け防止 */
}

/* スケジュールリストデザイン */
#schedule-list {
  position: absolute;
  top: 0;
  height: 100vh;
  right: 0;
  width: 25%;
  background: #ffe4c4;
  border-left: 6px solid #696969;
  margin: 0;
  padding: 0;
  list-style: none; 
  overflow-y: auto;
  font-size: clamp(14px, 1.5vw, 24px);
  z-index: 10;
}

#schedule-list h2 {
  font-size: clamp(20px, 2.3vw, 36px);
  margin: 0;
  margin-top: 20px;
  font-weight: bold;
  text-align: center;
}

#schedule-list ul {
  list-style-type: none;
  padding-left: 1em;
}

#schedule-list ul li {
  font-size: clamp(16px, 3vw, 32px);
  padding: 6px 10px;
  font-weight: bold;
  border-bottom: 1px solid #ddd; 
}

#schedule-list ul li .title {
  display: inline-block;
  color: #484848;
  font-weight: bold;
  white-space: normal;
  font-size: 0.85em; 
}

#schedule-list ul li .title .bullet {
  display: inline-block;
  margin-right: 6px;
  color: #484848;
  font-weight: bold;
  vertical-align: top;
  user-select: none;
}

#schedule-list ul li .time {
  display: block;
  margin-left: 1.1em;
  margin-top: 2px;
  color: #484848;
  font-weight: bold;
}

/* スケジュール画面（シート2用） */
#schedule-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  overflow: hidden;
  display: none; /* JSで切り替え */
  z-index: 5;
}

/* --- スケジュール表示エリア --- */
#schedule-body {
  position: absolute;
  top: 28vh; 
  left: 0;
  right: 0;
  bottom: 12vh;
  overflow: hidden; 
  display: flex;
  flex-direction: column;
  align-items: center; /* 全体を中央に寄せる */
  gap: 0;
}

/* 各行の幅を固定して中央配置 (80%くらいがちょうど良いです) */
.schedule-row-date, .schedule-row-title, .schedule-row-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  width: 80%; 
  max-width: 1200px;
  gap: 40px; /* A列とB列の間の距離（ここでお好みの近さに調整できます） */
}

/* タイトル行 */
.schedule-row-title {
  font-size: clamp(25px, 2.8vw, 38px);
  font-weight: bold;
  color: #333;
  margin-top: 0.5vh;
}

/* 内容行（時間など） */
.schedule-row-content {
  font-size: clamp(25px, 2.8vw, 38px);
  font-weight: bold;
  color: #333;
  margin-bottom: 0.5vh;
}

/* ▶ の表示（シート2専用） */
.has-bullet .text-wrapper {
  position: relative;
  padding-left: 1.2em;
}

.has-bullet .text-wrapper::before {
  content: "▶";
  position: absolute;
  left: 0;
  color: #000;
}
/* 字下げの設定：タイトルの▶の幅(1.2em)と完全に一致させる */
.no-bullet-cell {
  padding-left: 1.2em; 
}

/* 日付行も字下げして他の行とスタートを合わせる */
.schedule-row-date {
  font-size: clamp(25px, 3.5vw, 40px);
  font-weight: bold;
  color: #333;
  margin-bottom: 0.5vh;
}

.cell {
  font-weight: bold;
  white-space: nowrap; /* 折り返さずにスッキリ見せる */
}

.sub-info {
  color: #333;
  font-weight: bold;
}

/* 下部お知らせエリア（カウントダウン画面と同じスタイル） */
#schedule-announcement {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%; /* シート2ではリストがないので横幅いっぱい */
  box-sizing: border-box;
  padding: 10px 0;
  text-align: center;
  font-size: clamp(24px, 2.4vw, 38px);
  color: black;
  font-weight: bold;
  z-index: 100;
}

#schedule-announcement {
  position: absolute;
  bottom: 2vh;
  left: 5vw;
  right: 5vw;
  font-size: clamp(24px, 2.4vw, 38px);
  font-weight: bold;
}

#fullscreen-btn {
  position: absolute;
  right: 2vw;
  bottom: 2vh;
  width: clamp(24px, 2.5vw, 48px);
  height: clamp(24px, 2.5vw, 48px);
  cursor: pointer;
  /* z-indexを10000以上に引き上げて、どの画面よりも上にくるようにします */
  z-index: 99999; 
  opacity: 0.8;
  user-select: none;
}

/* スクロールバー調整 */
#schedule-list::-webkit-scrollbar { width: 8px; }
#schedule-list::-webkit-scrollbar-thumb { background-color: #cacabc; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="aspect-container">
    <div class="aspect-inner">
      
      <div class="logo-area">
        <img src="4413.png" id="top-banner" alt="上部バナー" />
        <img src="ロゴ.png" id="logo" alt="ロゴ" />
      </div>

      <div id="time-container">
        <div class="time-label">現在時刻</div>
        <div id="current-time-label">
          <span class="bracket">【</span>
          <span id="current-time">00:00:00</span>
          <span class="bracket">】</span>
        </div>
      </div>

      <div id="main">
        <h1 id="title">タイトル読み込み中...</h1>
        <div id="countdown">00:00:00.<span class="ms">000</span></div>
        <div id="announcement"></div>
      </div>

      <aside id="schedule-list">
        <h2>次のスケジュール</h2>
        <ul id="list"></ul>
      </aside>

      <div id="schedule-screen">
        <div id="schedule-body"></div>
        <div id="schedule-announcement"></div>
      </div>

      <img src="全画面.png" id="fullscreen-btn" alt="全画面" onclick="enterFullscreen()" />

      <audio id="sound-ato" src="ato.mp3" preload="auto"></audio>
      <audio id="sound-5" src="5.mp3" preload="auto"></audio>
      <audio id="sound-10" src="10.mp3" preload="auto"></audio>
      <audio id="sound-20" src="20.mp3" preload="auto"></audio>
      <audio id="sound-fun" src="hun.mp3" preload="auto"></audio>
      <audio id="bgm-hotaru" src="hotarushine.mp3" preload="auto" loop></audio>
    </div>
  </div>

  <button onclick="toggleWeek()" style="position:fixed; left:20px; bottom:20px; z-index:9999; background:#000; color:#fff; border:none; padding:22px 44px; font-size:26px; font-weight:bold; border-radius:8px; cursor:pointer;">
    切替
  </button>

<script>
  let played5 = false, played10 = false, played20 = false;
  let hotaruPlaying = false;
  let schedule = [], currentIndex = 0, countdownInterval;
  let serverTimeOffset = 0;
  let isScheduleMode = false;

  const sheetID = '1FX0WQZQ16bP5_z4ZES2-hxy7PN1CRYTf5OtF4oK3Oto';
  const baseURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=timesheet`;
  const sheet2URL =`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&sheet=シート2`;

  const titleElem = document.getElementById("title"),
        countdownElem = document.getElementById("countdown"),
        currentTimeElem = document.getElementById("current-time"),
        listElem = document.getElementById("list"),
        announcementElem = document.getElementById("announcement"),
        timeContainer = document.getElementById("time-container"),
        hotaruAudio = document.getElementById("bgm-hotaru");

  // --- 時刻同期・スケジュール取得系 ---
  async function fetchAccurateTime() {
    try {
      const localBefore = new Date().getTime();
      const res = await fetch("https://worldtimeapi.org/api/timezone/Asia/Tokyo");
      const localAfter = new Date().getTime();
      const data = await res.json();
      const serverTime = new Date(data.datetime).getTime();
      const localMidpoint = (localBefore + localAfter) / 2;
      serverTimeOffset = serverTime - localMidpoint;
    } catch (err) { console.error("時刻取得失敗:", err); }
  }

  function colorizeKeywords(text) {
    return text.replace(/JSB1000/g, '<span style="color:#CD5C5C;">JSB1000</span>')
               .replace(/ST1000/g, '<span style="color:#4682B4;">ST1000</span>');
  }

function fetchSchedule() {
    // 読み込み失敗時に画面を壊さないよう、try-catch的な発想で処理します
    fetch(baseURL + "&nocache=" + new Date().getTime())
      .then(res => {
        if (!res.ok) throw new Error('Network response was not ok');
        return res.text();
      })
      .then(data => {
        const json = JSON.parse(data.substring(47, data.length - 2));
        const rows = json.table.rows;
        
        // お知らせ更新（取得できた場合のみ）
        const announceText = rows[0]?.c[1]?.v;
        announcementElem.innerHTML = announceText ? `<span style="color: blue;">お知らせ：</span>${announceText}` : `<span style="color: blue;">お知らせ：</span>`;
        
        // スケジュールデータ更新
        const newSchedule = rows.slice(1).map(row => ({
          title: row.c[0]?.v || "（タイトルなし）",
          time: new Date(row.c[1]?.f || row.c[1]?.v)
        })).filter(item => !isNaN(item.time)).sort((a, b) => a.time - b.time);

        // データが正しく取得できていれば更新、空なら更新しない（バックアップ維持）
        if (newSchedule.length > 0) {
          schedule = newSchedule;
          updateScheduleList();
          startNextCountdown();
        }
      })
      .catch(err => {
        // ネット切断時はコンソールにログを出すだけで、画面には何も出さない
        console.warn("スプレッドシートの取得に失敗しました。以前のデータで継続します:", err);
      });
  }

  function updateScheduleList() {
    const now = new Date(Date.now() + serverTimeOffset);
    listElem.innerHTML = "";
    const upcoming = schedule.slice(currentIndex + 1);
    const todayKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
    let tomorrowInserted = false;

    for (const item of upcoming) {
      const itemKey = `${item.time.getFullYear()}-${item.time.getMonth()}-${item.time.getDate()}`;
      if (itemKey !== todayKey && !tomorrowInserted) {
        const sep = document.createElement("li");
        sep.innerHTML = `<div style="text-align:center; font-size: clamp(24px, 2.3vw, 36px); font-weight: bold; color: #000;">---------------------<br>明日のスケジュール</div>`;
        listElem.appendChild(sep);
        tomorrowInserted = true;
      }
      const li = document.createElement("li");
      li.innerHTML = `<div class="title"><span class="bullet">▶</span>${colorizeKeywords(item.title).replace(/\n/g, "<br>")}</div>` +
                     `<div class="time">${String(item.time.getHours()).padStart(2,"0")}:${String(item.time.getMinutes()).padStart(2,"0")}:${String(item.time.getSeconds()).padStart(2,"0")}</div>`;
      listElem.appendChild(li);
    }
  }

  function startNextCountdown() {
    const now = new Date(Date.now() + serverTimeOffset);
    while (currentIndex < schedule.length && schedule[currentIndex].time <= now) currentIndex++;
    if (currentIndex >= schedule.length) {
      titleElem.innerHTML = "終了しました";
      countdownElem.textContent = "--:--:--.---";
      return;
    }
    const { title, time } = schedule[currentIndex];
    titleElem.innerHTML = `${colorizeKeywords(title)}<br><span class="countdown-time">${time.toTimeString().slice(0,8)}まで</span>`;
    
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      const diff = time - new Date(Date.now() + serverTimeOffset);
      
      if (!played20 && diff <= 1200000 && diff > 1140000) { playSequentialSounds([document.getElementById("sound-ato"), document.getElementById("sound-20"), document.getElementById("sound-fun")]); played20 = true; }
      if (!played10 && diff <= 600000 && diff > 540000) { playSequentialSounds([document.getElementById("sound-ato"), document.getElementById("sound-10"), document.getElementById("sound-fun")]); played10 = true; }
      if (!played5 && diff <= 300000 && diff > 240000) { playSequentialSounds([document.getElementById("sound-ato"), document.getElementById("sound-5"), document.getElementById("sound-fun")]); played5 = true; }

      if (diff <= 0) {
        clearInterval(countdownInterval);
        currentIndex++;
        setTimeout(startNextCountdown, 2000);
      } else {
        const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        const ms = String(diff % 1000).padStart(3, '0');
        countdownElem.innerHTML = `${h}:${m}:${s}<span class="ms">.${ms}</span>`;
      }
    }, 50);
  }

  function playSequentialSounds(sounds) {
    if (sounds.length === 0) return;
    const [first, ...rest] = sounds;
    first.currentTime = 0;
    first.play().then(() => { first.onended = () => playSequentialSounds(rest); }).catch(e => {});
  }

  // --- 画面切替ロジック ---
  function toggleWeek() {
    isScheduleMode = !isScheduleMode;
    const cdMain = document.getElementById("main");
    const cdList = document.getElementById("schedule-list");
    const scheduleScreen = document.getElementById("schedule-screen");

    if (isScheduleMode) {
      cdMain.style.display = "none";
      cdList.style.display = "none";
      scheduleScreen.style.display = "block";
      document.body.style.background = "#f6dede";
      timeContainer.style.left = "82%";
      loadSheet2(); 
    } else {
      cdMain.style.display = "block";
      cdList.style.display = "block";
      scheduleScreen.style.display = "none";
      document.body.style.background = "#fff";
      timeContainer.style.left = "58%";
    }
    let sheet2Interval;
    if (isScheduleMode) {
      loadSheet2();
      sheet2Interval = setInterval(loadSheet2, 30000);
    } else {
      clearInterval(sheet2Interval);
    }
  }

async function loadSheet2() {
    try {
      const res = await fetch(sheet2URL + "&nocache=" + new Date().getTime());
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      const rows = json.table.rows;

      const announce2 = rows[0]?.c[1]?.v || "";
      document.getElementById("schedule-announcement").innerHTML = 
        `<span style="color: blue;">お知らせ：</span>${announce2}`;

      let html = '';
      rows.slice(1, 10).forEach((row, index) => {
        let valA = row.c[0] ? (row.c[0].f || row.c[0].v) : "";
        let valB = row.c[1] ? (row.c[1].f || row.c[1].v) : "";
        if (!valA && !valB) return;

        let contentA = colorizeKeywords(String(valA));
        let contentB = colorizeKeywords(String(valB));

        // 行の種類を判定
        let isDateRow = (index === 0);
        let isTitleRow = (index % 2 !== 0); // 3, 5, 7, 9行目
        let isContentRow = (!isDateRow && !isTitleRow);  // ★追加

        // A列のHTML生成（タイトル行かつ文字がある時だけ has-bullet を付与）
        let classA = (isTitleRow && valA) ? "has-bullet" : "no-bullet-cell";
        let partA = `<div class="cell-a ${classA}"><div class="text-wrapper">${contentA}</div></div>`;

        // B列のHTML生成（タイトル行かつ文字がある時だけ has-bullet を付与）
        let classB = (isTitleRow && valB) ? "has-bullet" : "no-bullet-cell";
        let partB = `<div class="cell-b ${classB}"><div class="text-wrapper">${contentB}</div></div>`;

        // 行全体のクラス設定
        let rowClass = isDateRow ? "schedule-row-date" : (isTitleRow ? "schedule-row-title" : "schedule-row-content");

        html += `<div class="${rowClass}">${partA}${partB}</div>`;
      });
      document.getElementById("schedule-body").innerHTML = html;
    } catch (e) { console.error("シート2読込失敗", e); }
  }

  // 全画面表示
  function enterFullscreen() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
  }

  // 初期化
  (async () => {
    await fetchAccurateTime();
    fetchSchedule();
    setInterval(fetchSchedule, 30000);
    function tick() {
      const now = new Date(Date.now() + serverTimeOffset);
      currentTimeElem.textContent = now.toTimeString().slice(0, 8);
      setTimeout(tick, 1000 - (Date.now() % 1000));
    }
    tick();
  })();
</script>
</body>
</html>
