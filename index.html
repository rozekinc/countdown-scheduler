<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="app-build" content="1.0.0+fb6c725" />
  <title>カウントダウンスケジューラー</title>
  <link rel="stylesheet" href="assets/main.css?v=0fd5b239a2" />
</head>
<body>
  <div class="aspect-container">
    <!-- The stage is a free canvas: every visible piece is a positioned
         `.layout-item` placed by the per-app layout (data/layouts/<appId>.json,
         see src/layoutManager.ts). Geometry is stage-percent -> cqw/cqh so
         items stretch with the stage on any screen or aspect ratio.
         Singleton items (clock / countdown / schedule / announcement) keep
         their canonical markup here so the existing controllers can bind to
         it once at startup; the layout only moves/sizes/shows these hosts.
         Dynamic text/image items are created into #stage at runtime. -->
    <div class="aspect-inner" id="stage">

      <!-- Clock -->
      <div class="layout-item" id="li-clock" data-screen="shared">
        <div id="time-container">
          <div class="time-label" id="time-label">現在時刻</div>
          <div id="current-time-label">
            <span class="bracket">【</span>
            <span id="current-time">00:00:00</span>
            <span class="bracket">】</span>
          </div>
        </div>
      </div>

      <!-- Countdown title: the event's title + target time. Split into its own
           singleton host so it can be placed/sized independently of the timer
           and fit to its own bounded height (see src/countdown.ts fitMain). -->
      <div class="layout-item" id="li-countdownTitle" data-screen="countdown">
        <h1 id="title">タイトル読み込み中...</h1>
      </div>

      <!-- Countdown: big timer. Becomes the stoppage count-up/down timer while
           a red flag is up (see src/countdown.ts, #countdown.rf-stoppage). -->
      <div class="layout-item" id="li-countdown" data-screen="countdown">
        <div id="main">
          <div id="countdown">00:00:00.<span class="ms">000</span></div>
        </div>
      </div>

      <!-- Next-schedule sidebar list. -->
      <div class="layout-item" id="li-scheduleList" data-screen="countdown">
        <aside id="schedule-list">
          <h2 id="next-schedule-label">次のスケジュール</h2>
          <!-- The immediately-next item is pinned static here; the items after
               it scroll in #list-viewport below (see src/countdown.ts). -->
          <div id="list-next-pinned"></div>
          <div id="list-viewport"></div>
        </aside>
      </div>

      <!-- Schedule view: day columns, built in src/schedule.ts. Hidden until
           the layout manager places it (countdown is the default screen), so
           its coloured panel never flashes over the countdown on first paint. -->
      <div class="layout-item" id="li-scheduleColumns" data-screen="schedule" style="display:none">
        <div id="schedule-screen">
          <div id="schedule-columns"></div>
        </div>
      </div>

      <!-- Shared announcement bar. -->
      <div class="layout-item" id="li-announcement" data-screen="shared">
        <div id="announcement" class="announcement-bar"></div>
      </div>

      <!-- Red-flag stoppage is shown inline: the main countdown becomes the
           count-up/down stoppage timer and the title becomes the RED FLAG
           banner (see src/countdown.ts). The stage also gets a red border via
           body.red-flag-on. Driven from the admin (config.redFlag). -->

      <img src="media/images/全画面.png" id="fullscreen-btn" alt="全画面" />

      <audio id="sound-ato" src="media/audio/ato.mp3" preload="auto"></audio>
      <audio id="sound-5" src="media/audio/5.mp3" preload="auto"></audio>
      <audio id="sound-10" src="media/audio/10.mp3" preload="auto"></audio>
      <audio id="sound-20" src="media/audio/20.mp3" preload="auto"></audio>
      <audio id="sound-fun" src="media/audio/hun.mp3" preload="auto"></audio>
    </div>
  </div>

  <!-- 切替 / red flag / scroll are driven from the admin now (they ride the
       display config + live snapshot); the display carries no operator buttons
       apart from fullscreen. -->

  <script src="assets/main.js?v=0fd5b239a2" defer></script>
</body>
</html>
