<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="app-build" content="1.0.0+6680c0f" />
  <title>カウントダウンスケジューラー</title>
  <link rel="stylesheet" href="assets/main.css?v=6bdc16bf10" />
</head>
<body>
  <div class="aspect-container">
    <div class="aspect-inner">

      <div class="logo-area">
        <img src="media/images/4413.png" id="top-banner" alt="上部バナー" />
        <img src="media/images/ロゴ.png" id="logo" alt="ロゴ" />
      </div>

      <div id="time-container">
        <div class="time-label" id="time-label">現在時刻</div>
        <div id="current-time-label">
          <span class="bracket">【</span>
          <span id="current-time">00:00:00</span>
          <span class="bracket">】</span>
        </div>
      </div>

      <!-- Red-flag indicator: shown top-left only while a red flag is active
           (see src/countdown.ts setRedFlag). Hidden otherwise. -->
      <div id="red-flag" class="rf-hidden" aria-hidden="true">
        <span class="rf-flag"></span>
        <span id="red-flag-text" class="rf-text">RED FLAG</span>
      </div>

      <div id="main">
        <h1 id="title">タイトル読み込み中...</h1>
        <div id="countdown">00:00:00.<span class="ms">000</span></div>
        <!-- Stoppage timer: counts UP from when the red flag was raised.
             Shown only during a red flag; the main countdown freezes. -->
        <div id="stoppage" class="rf-hidden">
          <div id="stoppage-label" class="stoppage-label">STOPPAGE</div>
          <div id="stoppage-timer">00:00:00</div>
        </div>
      </div>
      <!-- Sibling of #main, not nested inside it: an announcement bar
           positioned inside #main compounds #main's own top offset with
           its own (a real bug in the original app), pushing it much lower
           than intended. Both announcement bars share one CSS rule
           (.announcement-bar) so they sit at the same place on either
           screen. -->
      <div id="announcement" class="announcement-bar"></div>

      <aside id="schedule-list">
        <h2 id="next-schedule-label">次のスケジュール</h2>
        <!-- The list auto-scrolls vertically when its items overflow this
             viewport; see src/verticalScroll.ts setScrollingList. -->
        <div id="list-viewport"></div>
      </aside>

      <div id="schedule-screen">
        <!-- Day columns are built in src/schedule.ts from scheduleDays[]. -->
        <div id="schedule-columns"></div>
        <div id="schedule-announcement" class="announcement-bar"></div>
      </div>

      <img src="media/images/全画面.png" id="fullscreen-btn" alt="全画面" />

      <audio id="sound-ato" src="media/audio/ato.mp3" preload="auto"></audio>
      <audio id="sound-5" src="media/audio/5.mp3" preload="auto"></audio>
      <audio id="sound-10" src="media/audio/10.mp3" preload="auto"></audio>
      <audio id="sound-20" src="media/audio/20.mp3" preload="auto"></audio>
      <audio id="sound-fun" src="media/audio/hun.mp3" preload="auto"></audio>
    </div>
  </div>

  <!-- Operator controls. Dimmed until the pointer moves so they stay out of
       the way on a venue screen; see #op-controls in styles.css. -->
  <div id="op-controls">
    <button id="toggle-btn" type="button">切替</button>
    <button id="redflag-btn" type="button">🚩 Red flag</button>
    <button id="marquee-btn" type="button">⏸ Scroll</button>
    <button id="source-btn" type="button">Source: GitHub</button>
  </div>

  <script src="assets/main.js?v=6bdc16bf10" defer></script>
</body>
</html>
